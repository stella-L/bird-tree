<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>탐조 나무</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19231c;
      --muted: #5b665e;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(25, 35, 28, 0.15);
      --leaf: #2d6d48;
      --action: #2365a8;
      --danger: #b13f37;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #d9edf1;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      pointer-events: none;
    }

    .panel {
      align-self: stretch;
      margin: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 44px rgba(34, 49, 42, 0.16);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: calc(100vh - 32px);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }

    input:focus {
      border-color: rgba(35, 101, 168, 0.65);
      box-shadow: 0 0 0 3px rgba(35, 101, 168, 0.16);
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 13px;
      min-height: 44px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--action);
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .clear {
      min-height: 34px;
      padding: 0 10px;
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(177, 63, 55, 0.35);
    }

    .bird-list {
      overflow: auto;
      display: grid;
      gap: 8px;
      padding-right: 2px;
    }

    .bird-item {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .bird-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .remove {
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      line-height: 1;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.45;
      background: rgba(255, 255, 255, 0.45);
    }

    .source {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .source a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .visitor {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 13px;
    }

    .visitor strong {
      color: var(--ink);
    }

    .small {
      min-height: 30px;
      padding: 0 9px;
      background: transparent;
      color: var(--action);
      border: 1px solid rgba(35, 101, 168, 0.35);
      font-size: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(25, 35, 28, 0.36);
      pointer-events: auto;
    }

    .modal[hidden] {
      display: none;
    }

    .dialog {
      width: min(100%, 380px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 54px rgba(25, 35, 28, 0.24);
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
    }

    .dialog p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .name-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .panel {
        margin: 10px;
        max-height: min(52vh, 430px);
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-hidden="true"></canvas>
  <main class="app">
    <section class="panel" aria-label="탐조 기록">
      <header>
        <h1>탐조 나무</h1>
        <p class="sub">관찰한 새 이름을 입력하면 나뭇가지 위에 한 마리씩 올라갑니다.</p>
      </header>

      <div class="visitor">
        <span>기록자 <strong id="visitorNameLabel"></strong></span>
        <button class="small" id="changeVisitor" type="button">변경</button>
      </div>

      <form id="birdForm">
        <input id="birdInput" name="bird" type="text" maxlength="36" autocomplete="off" list="birdSuggestions" placeholder="예: 박새, 물총새, 직박구리" aria-label="관찰한 새 이름">
        <datalist id="birdSuggestions"></datalist>
        <button type="submit">올리기</button>
      </form>

      <div class="toolbar">
        <div class="count" id="birdCount">0마리</div>
        <button class="clear" id="clearBirds" type="button">비우기</button>
      </div>

      <div class="bird-list" id="birdList"></div>
      <div class="status" id="syncStatus"></div>
      <div class="source">조류명/서식지: <a href="https://www.science.go.kr/mps/scienceSubject/bird/list.do" target="_blank" rel="noopener">국립중앙과학관 우리나라 텃새</a></div>
    </section>
  </main>

  <div class="modal" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="nameTitle" hidden>
    <div class="dialog">
      <h2 id="nameTitle">이름 입력</h2>
      <p>새를 저장한 사람을 표시하기 위해 이름만 저장합니다.</p>
      <form class="name-form" id="nameForm">
        <input id="nameInput" name="name" type="text" maxlength="20" autocomplete="name" placeholder="이름" aria-label="이름">
        <button type="submit">시작</button>
      </form>
    </div>
  </div>

    function makeCylinderBetween(start, end, radius, material) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * 0.68, radius, direction.length(), 18),
        material
      );
      mesh.position.copy(midpoint);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createTree() {
      const trunk = makeCylinderBetween(
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 4.5, 0),
        0.42,
        trunkMaterial
      );
      root.add(trunk);

      const branches = [
        [[0, 1.9, 0], [-3.25, 2.62, 0.08], 0.16],
        [[0, 2.15, 0], [3.05, 2.82, 0.05], 0.15],
        [[0, 2.88, 0], [-2.38, 3.58, -0.12], 0.13],
        [[0, 3.02, 0], [2.22, 3.78, -0.1], 0.12],
        [[0, 3.55, 0], [-1.22, 4.42, 0.04], 0.11],
        [[0, 3.72, 0], [1.34, 4.52, 0.02], 0.1],
        [[0, 4.1, 0], [-0.34, 5.18, 0], 0.09]
      ];

      branches.forEach(([a, b, radius]) => {
        root.add(makeCylinderBetween(new THREE.Vector3(...a), new THREE.Vector3(...b), radius, branchMaterial));
      });

      const leafPositions = [
        [-3.2, 2.95, -0.18, 1.15], [3.05, 3.1, -0.15, 1.12], [-2.2, 3.85, -0.28, 1.0],
        [2.18, 4.02, -0.25, 1.0], [-1.05, 4.6, -0.1, 1.06], [1.2, 4.72, -0.12, 1.0],
        [0.0, 5.25, -0.16, 1.22], [-0.45, 3.85, -0.34, 1.05], [0.52, 3.92, -0.36, 1.05]
      ];

      leafPositions.forEach(([x, y, z, size], index) => {
        const leaves = new THREE.Mesh(
          new THREE.IcosahedronGeometry(size, 1),
          leafMaterials[index % leafMaterials.length]
        );
        leaves.position.set(x, y, z);
        leaves.scale.set(1.25, 0.86, 0.95);
        leaves.castShadow = true;
        root.add(leaves);
      });
    }

    function createPerchLabel(name, visitorName) {
      const textureCanvas = document.createElement("canvas");
      const context = textureCanvas.getContext("2d");
      const width = 320;
      const height = 104;
      textureCanvas.width = width;
      textureCanvas.height = height;
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = "rgba(255, 255, 255, 0.88)";
      roundRect(context, 10, 12, width - 20, height - 24, 18);
      context.fill();
      context.strokeStyle = "rgba(25, 35, 28, 0.18)";
      context.stroke();
      context.fillStyle = "#19231c";
      fitText(context, name, width - 42, 28);
      context.fillText(name, width / 2, 43);
      if (visitorName) {
        context.fillStyle = "#2365a8";
        fitText(context, `by ${visitorName}`, width - 46, 22);
        context.fillText(`by ${visitorName}`, width / 2, 70);
      }

      const texture = new THREE.CanvasTexture(textureCanvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
      sprite.scale.set(1.78, 0.58, 1);
      sprite.position.y = 0.86;
      return sprite;
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + width, y, x + width, y + height, radius);
      context.arcTo(x + width, y + height, x, y + height, radius);
      context.arcTo(x, y + height, x, y, radius);
      context.arcTo(x, y, x + width, y, radius);
      context.closePath();
    }

    function fitText(context, text, maxWidth, startSize) {
      let size = startSize;
      while (size > 13) {
        context.font = `700 ${size}px system-ui, -apple-system, sans-serif`;
        if (context.measureText(text).width <= maxWidth) return;
        size -= 1;
      }
    }

    function createBird(sighting, index) {
      const fallback = palette[index % palette.length];
      const shifted = new THREE.Color(fallback);
      const profile = birdProfiles[sighting.name] || {
        body: fallback,
        head: shifted.clone().offsetHSL(-0.02, 0.03, -0.1).getHex(),
        wing: shifted.clone().offsetHSL(-0.04, 0.08, -0.18).getHex(),
        belly: shifted.clone().offsetHSL(0.05, -0.18, 0.28).getHex(),
        cheek: 0xf7efe1,
        tail: shifted.clone().offsetHSL(-0.02, 0.06, -0.25).getHex(),
        beak: 0xd49a35
      };
      const spot = branchSpots[index % branchSpots.length];
      const layer = Math.floor(index / branchSpots.length);
      const group = new THREE.Group();
      const scale = 0.78 + (index % 5) * 0.035;
      const mat = (color, roughness = 0.66) => new THREE.MeshStandardMaterial({ color, roughness });

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.34, 32, 22),
        mat(profile.body, 0.7)
      );
      body.scale.set(1.45, 0.86, 0.9);
      body.rotation.z = -0.08;
      body.castShadow = true;
      group.add(body);

      const belly = new THREE.Mesh(
        new THREE.SphereGeometry(0.24, 24, 16),
        mat(profile.belly, 0.76)
      );
      belly.position.set(0.1, -0.08, 0.25);
      belly.scale.set(1.35, 0.68, 0.34);
      belly.rotation.z = -0.04;
      group.add(belly);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.23, 32, 20),
        mat(profile.head, 0.62)
      );
      head.position.set(0.43, 0.22, 0.02);
      head.scale.set(1.05, 0.95, 0.95);
      head.castShadow = true;
      group.add(head);

      const cheek = new THREE.Mesh(
        new THREE.SphereGeometry(0.105, 18, 12),
        mat(profile.cheek, 0.72)
      );
      cheek.position.set(0.5, 0.18, 0.16);
      cheek.scale.set(1.05, 0.75, 0.28);
      group.add(cheek);

      const beak = new THREE.Mesh(
        new THREE.ConeGeometry(0.055, 0.28, 24),
        mat(profile.beak, 0.5)
      );
      beak.rotation.z = -Math.PI / 2;
      beak.position.set(0.66, 0.19, 0.02);
      beak.scale.set(0.72, 1, 0.72);
      group.add(beak);

      const mask = new THREE.Mesh(
        new THREE.SphereGeometry(0.095, 18, 10),
        mat(0x151515, 0.48)
      );
      mask.position.set(0.48, 0.245, 0.18);
      mask.scale.set(1.55, 0.34, 0.14);
      mask.rotation.z = -0.08;
      group.add(mask);

      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.026, 14, 10), mat(0x090909, 0.22));
      eye.position.set(0.535, 0.265, 0.235);
      group.add(eye);

      const eyeSpark = new THREE.Mesh(new THREE.SphereGeometry(0.007, 8, 6), mat(0xffffff, 0.12));
      eyeSpark.position.set(0.547, 0.274, 0.255);
      group.add(eyeSpark);

      const wing = new THREE.Mesh(
        new THREE.SphereGeometry(0.24, 28, 18),
        mat(profile.wing, 0.72)
      );
      wing.position.set(-0.05, 0.02, 0.24);
      wing.scale.set(1.35, 0.34, 0.44);
      wing.rotation.z = -0.34;
      wing.rotation.y = 0.08;
      group.add(wing);

      [-0.12, 0.0, 0.12].forEach((offset, featherIndex) => {
        const feather = new THREE.Mesh(
          new THREE.BoxGeometry(0.36, 0.032, 0.018),
          mat(new THREE.Color(profile.wing).offsetHSL(0, 0, -0.08 - featherIndex * 0.03).getHex(), 0.78)
        );
        feather.position.set(-0.07 - featherIndex * 0.04, -0.01 - featherIndex * 0.035, 0.285 + offset * 0.22);
        feather.rotation.z = -0.45;
        feather.rotation.y = 0.14;
        group.add(feather);
      });

      [-0.09, 0.0, 0.09].forEach((offset, tailIndex) => {
        const tail = new THREE.Mesh(
          new THREE.ConeGeometry(0.06, 0.46, 4),
          mat(new THREE.Color(profile.tail).offsetHSL(0, 0, tailIndex * -0.04).getHex(), 0.74)
        );
        tail.rotation.z = Math.PI / 2;
        tail.rotation.y = offset * 1.8;
        tail.position.set(-0.5, -0.02, offset);
        tail.scale.set(0.8, 1, 0.45);
        group.add(tail);
      });

      const legMaterial = mat(0x553a24, 0.82);
      [-0.12, 0.1].forEach((x) => {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.014, 0.23, 8), legMaterial);
        leg.position.set(x, -0.32, 0.04);
        leg.rotation.z = 0.05;
        group.add(leg);

        [-0.085, 0, 0.085].forEach((spread) => {
          const toe = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.007, 0.18, 8), legMaterial);
          toe.position.set(x + spread * 0.25, -0.44, 0.095 + Math.abs(spread) * 0.5);
          toe.rotation.x = Math.PI / 2 + spread * 1.4;
          toe.rotation.z = Math.PI / 2;
          group.add(toe);
        });
      });

      group.add(createPerchLabel(sighting.name, sighting.visitorName));
      group.position.set(
        spot.x + ((layer % 2) * 0.24 - 0.12),
        spot.y + 0.18 + layer * 0.32,
        0.92 + spot.z * 0.28 + layer * 0.08
      );
      group.rotation.y = spot.r;
      group.scale.setScalar(scale);
      group.userData.floatPhase = index * 0.77;
      group.userData.baseY = group.position.y;
      birdsGroup.add(group);
    }

    function loadSightings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved.filter((item) => item && item.name).slice(0, 48) : [];
      } catch {
        return [];
      }
    }

    function saveSightings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sightings));
    }

    let sightings = loadSightings();
    let visitorName = localStorage.getItem(VISITOR_KEY) || "";

    function setVisitorName(name) {
      visitorName = name.trim().replace(/\s+/g, " ");
      localStorage.setItem(VISITOR_KEY, visitorName);
      visitorNameLabel.textContent = visitorName || "미입력";
      nameModal.hidden = Boolean(visitorName);
      if (visitorName) input.focus();
    }

    function requestVisitorName() {
      nameInput.value = visitorName;
      nameModal.hidden = false;
      setTimeout(() => nameInput.focus(), 0);
    }

    async function sendSightingToSheet(sighting) {
      if (!APPS_SCRIPT_URL) {
        syncStatus.textContent = "Apps Script URL을 넣으면 Google Sheets에 저장됩니다.";
        return;
      }

      syncStatus.textContent = "Google Sheets에 저장 중...";
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(sighting)
        });
        syncStatus.textContent = "Google Sheets 저장 요청 완료";
      } catch {
        syncStatus.textContent = "Google Sheets 저장에 실패했습니다.";
      }
    }

    function loadSightingsFromSheet() {
      if (!APPS_SCRIPT_URL) return;

      const callbackName = `loadBirdTree_${Date.now()}`;
      const script = document.createElement("script");
      const separator = APPS_SCRIPT_URL.includes("?") ? "&" : "?";

      syncStatus.textContent = "Google Sheets 기록을 불러오는 중...";
      window[callbackName] = (rows) => {
        delete window[callbackName];
        script.remove();

        if (!Array.isArray(rows)) {
          syncStatus.textContent = "Google Sheets 기록을 불러오지 못했습니다.";
          return;
        }

        sightings = rows
          .filter((item) => item && item.name)
          .map((item) => ({
            visitorName: item.visitorName || "",
            name: item.name,
            habitat: item.habitat || birdInfo.get(item.name)?.habitat || "",
            createdAt: Number(item.createdAt) || Date.now(),
            savedAt: item.savedAt || ""
          }))
          .slice(-48);
        saveSightings();
        refreshBirds();
        syncStatus.textContent = sightings.length ? "Google Sheets 기록을 불러왔습니다." : "";
      };

      script.onerror = () => {
        delete window[callbackName];
        script.remove();
        syncStatus.textContent = "Google Sheets 기록을 불러오지 못했습니다.";
      };

      script.src = `${APPS_SCRIPT_URL}${separator}callback=${encodeURIComponent(callbackName)}`;
      document.body.append(script);
    }

    function renderBirdList() {
      birdCount.textContent = `${sightings.length}마리`;
      birdList.innerHTML = "";

      if (!sightings.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 나무에 올라간 새가 없습니다.";
        birdList.append(empty);
        return;
      }

      sightings.forEach((sighting, index) => {
        const item = document.createElement("div");
        item.className = "bird-item";

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.backgroundColor = `#${palette[index % palette.length].toString(16).padStart(6, "0")}`;

        const name = document.createElement("span");
        name.className = "bird-name";
        const info = birdInfo.get(sighting.name);
        const owner = sighting.visitorName ? ` · ${sighting.visitorName}` : "";
        name.textContent = info ? `${sighting.name}${owner} · ${info.habitat}` : `${sighting.name}${owner}`;

        const remove = document.createElement("button");
        remove.className = "remove";
        remove.type = "button";
        remove.textContent = "x";
        remove.setAttribute("aria-label", `${sighting.name} 삭제`);
        remove.addEventListener("click", () => {
          sightings.splice(index, 1);
          saveSightings();
          refreshBirds();
        });

        item.append(swatch, name, remove);
        birdList.append(item);
      });
    }

    function refreshBirds() {
      birdsGroup.clear();
      sightings.forEach(createBird);
      renderBirdList();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = input.value.trim().replace(/\s+/g, " ");
      if (!name) return;
      if (!visitorName) {
        requestVisitorName();
        return;
      }
      const info = birdInfo.get(name);
      const sighting = {
        visitorName,
        name,
        habitat: info?.habitat || "",
        createdAt: Date.now(),
        savedAt: new Date().toISOString()
      };
      sightings.push(sighting);
      input.value = "";
      saveSightings();
      refreshBirds();
      sendSightingToSheet(sighting);
    });

    nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim().replace(/\s+/g, " ");
      if (!name) return;
      setVisitorName(name);
    });

    changeVisitor.addEventListener("click", requestVisitorName);

    clearButton.addEventListener("click", () => {
      sightings = [];
      saveSightings();
      refreshBirds();
      input.focus();
    });

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      root.position.x = width < 720 ? 0.25 : 1.65;
      camera.position.set(width < 720 ? 0 : 0.55, width < 720 ? 3.9 : 3.55, width < 720 ? 12.8 : 10.2);
      camera.lookAt(root.position.x, 3.15, 0);
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      const seconds = time * 0.001;
      root.rotation.y = Math.sin(seconds * 0.18) * 0.08;
      birdsGroup.children.forEach((bird) => {
        bird.position.y = bird.userData.baseY + Math.sin(seconds * 1.6 + bird.userData.floatPhase) * 0.025;
      });
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    knownBirds.forEach((bird) => {
      const option = document.createElement("option");
      option.value = bird.name;
      option.label = bird.habitat;
      birdSuggestions.append(option);
    });

    createTree();
    setVisitorName(visitorName);
    if (!visitorName) requestVisitorName();
    refreshBirds();
    loadSightingsFromSheet();
    resize();
    window.addEventListener("resize", resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
