<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전선 위 새들</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19231c;
      --muted: #5b665e;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(25, 35, 28, 0.15);
      --action: #2365a8;
      --danger: #b13f37;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #dfeff5;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    #scene:active {
      cursor: grabbing;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      pointer-events: none;
    }

    .panel {
      align-self: stretch;
      margin: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 44px rgba(34, 49, 42, 0.16);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: calc(100vh - 32px);
      transform: translateY(0);
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
      opacity: 1;
    }

    .panel.collapsed {
      transform: translateY(calc(100% - 40px));
    }

    .sheet-handle {
      display: none;
    }

    @media (max-width: 720px) {
      .sheet-handle {
        display: block;
        width: 36px;
        height: 4px;
        background: rgba(25, 35, 28, 0.22);
        border-radius: 2px;
        margin: 0 auto 4px;
        flex-shrink: 0;
        cursor: grab;
      }
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }

    input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }

    input:focus {
      border-color: rgba(35, 101, 168, 0.65);
      box-shadow: 0 0 0 3px rgba(35, 101, 168, 0.16);
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 13px;
      min-height: 44px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--action);
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .clear,
    .reload {
      min-height: 34px;
      padding: 0 10px;
      background: transparent;
      border: 1px solid rgba(35, 101, 168, 0.35);
      color: var(--action);
    }

    .clear {
      color: var(--danger);
      border: 1px solid rgba(177, 63, 55, 0.35);
    }

    .pick-bird {
      background: transparent;
      border: 1px solid rgba(35, 101, 168, 0.35);
      color: var(--action);
    }

    .view-reset,
    .screen-shot,
    .music-toggle {
      position: fixed;
      z-index: 4;
      right: 18px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(35, 101, 168, 0.3);
      background: rgba(255, 255, 255, 0.86);
      color: var(--action);
      box-shadow: 0 10px 28px rgba(25, 35, 28, 0.14);
      backdrop-filter: blur(12px);
      pointer-events: auto;
    }

    .view-reset {
      top: 18px;
    }

    .screen-shot {
      top: 64px;
    }

    .music-toggle {
      top: 110px;
    }

    .bird-list {
      overflow: auto;
      display: grid;
      gap: 8px;
      padding-right: 2px;
    }

    .bird-item {
      display: grid;
      grid-template-columns: 14px 1fr auto auto auto;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }

    .bird-item.selected {
      border-color: rgba(35, 101, 168, 0.72);
      background: rgba(35, 101, 168, 0.12);
      box-shadow: inset 3px 0 0 var(--action);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .bird-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .face,
    .direction,
    .remove {
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      line-height: 1;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
    }

    .face,
    .direction {
      padding: 0 8px;
      color: var(--action);
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.45;
      background: rgba(255, 255, 255, 0.45);
    }

    .source {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .source a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .visitor {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 13px;
    }

    .visitor strong {
      color: var(--ink);
    }

    .small {
      min-height: 30px;
      padding: 0 9px;
      background: transparent;
      color: var(--action);
      border: 1px solid rgba(35, 101, 168, 0.35);
      font-size: 12px;
    }

    .bird-popup {
      position: fixed;
      z-index: 6;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(92vw, 320px);
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 16px 44px rgba(25, 35, 28, 0.26);
      pointer-events: auto;
    }

    .bird-popup[hidden] {
      display: none;
    }

    .bird-popup h3 {
      margin: 0 24px 6px 0;
      font-size: 17px;
      color: var(--ink, #20271f);
    }

    .bird-popup-habitat {
      margin: 0 0 4px;
      font-size: 13px;
      line-height: 1.5;
      color: #4a544a;
    }

    .bird-popup-owner {
      margin: 0;
      font-size: 12px;
      color: #7a857a;
    }

    .bird-popup-owner:empty,
    .bird-popup-habitat:empty,
    .bird-popup-message:empty {
      display: none;
    }

    .bird-popup-message {
      margin: 7px 0 0;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(35, 101, 168, 0.08);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
    }

    .message-form {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .message-form[hidden] {
      display: none;
    }

    .message-form textarea {
      width: 100%;
      min-height: 62px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      font-size: 13px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
      outline: none;
    }

    .message-form button {
      justify-self: end;
      min-height: 34px;
    }

    .bird-popup-close {
      position: absolute;
      top: 8px;
      right: 10px;
      border: none;
      background: none;
      font-size: 20px;
      line-height: 1;
      color: #8a948a;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(25, 35, 28, 0.36);
      pointer-events: auto;
    }

    .modal[hidden] {
      display: none;
    }

    .dialog {
      width: min(100%, 380px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 54px rgba(25, 35, 28, 0.24);
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
    }

    .dialog p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .update-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
      padding: 0;
      list-style: none;
    }

    .update-list li {
      padding: 7px 10px;
      border: 1px solid rgba(35, 101, 168, 0.24);
      border-radius: 999px;
      background: rgba(35, 101, 168, 0.08);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
    }

    .bird-picker-dialog {
      width: min(94vw, 720px);
      max-height: min(86vh, 720px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .bird-picker-search {
      width: 100%;
    }

    .bird-picker-grid {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 8px;
      padding-right: 2px;
    }

    .bird-choice {
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 9px;
      min-height: 64px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      text-align: left;
    }

    .bird-choice.selected {
      border-color: rgba(35, 101, 168, 0.72);
      box-shadow: 0 0 0 3px rgba(35, 101, 168, 0.14);
    }

    .bird-choice-thumb {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: rgba(168, 201, 156, 0.38);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .bird-choice-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }

    .bird-choice-name {
      min-width: 0;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .bird-choice-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .bird-picker-actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
    }

    .bird-picker-selected {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .name-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
      }

      .app {
        grid-template-columns: 1fr;
        align-items: end;
      }

      .panel {
        align-self: end;
        margin: 8px;
        padding: 12px;
        gap: 10px;
        max-height: min(46svh, 390px);
        border-radius: 8px;
      }

      h1 {
        font-size: 20px;
      }

      .sub {
        display: none;
      }

      .visitor {
        padding: 8px 10px;
      }

      form {
        grid-template-columns: minmax(0, 1fr) auto auto;
      }

      .view-reset,
      .screen-shot {
        display: none;
      }

      .music-toggle {
        top: 10px;
        right: 10px;
        min-height: 34px;
        font-size: 12px;
      }

      input {
        padding: 10px;
        font-size: 16px;
      }

      button {
        min-height: 40px;
        padding: 0 10px;
      }

      .toolbar {
        grid-template-columns: 1fr auto auto;
        gap: 6px;
      }

      .bird-list {
        max-height: 116px;
      }

      .bird-item {
        grid-template-columns: 10px minmax(0, 1fr) auto auto auto;
        gap: 6px;
        padding: 7px 8px;
        font-size: 12px;
      }

      .swatch {
        width: 10px;
        height: 10px;
      }

      .face,
      .direction,
      .remove {
        min-width: 28px;
        min-height: 28px;
        font-size: 11px;
      }

      .source {
        display: none;
      }

      .status {
        min-height: 14px;
      }

      .modal {
        align-items: end;
        padding: 10px;
      }

      .bird-picker-dialog {
        width: 100%;
        max-height: min(86svh, 680px);
        padding: 16px;
      }

      .bird-picker-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .bird-choice {
        grid-template-columns: 42px 1fr;
        min-height: 58px;
        padding: 7px;
      }

      .bird-choice-thumb {
        width: 42px;
        height: 42px;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene" aria-hidden="true"></canvas>
  <audio id="backgroundMusic" src="./전선 위 새들.wav" preload="auto"></audio>
  <button class="view-reset" id="resetView" type="button">원래대로</button>
  <button class="screen-shot" id="captureScene" type="button">찰칵</button>
  <button class="music-toggle" id="musicToggle" type="button">노래 끄기</button>
  <main class="app">
    <section class="panel" aria-label="탐조 기록">
      <div class="sheet-handle" id="sheetHandle" aria-label="패널 열기/닫기"></div>

      <header>
        <h1>전선 위 새들</h1>
        <p class="sub">관찰한 새 이름을 입력하면 전선 위에 한 마리씩 앉습니다.</p>
      </header>

      <div class="visitor">
        <span>기록자 <strong id="visitorNameLabel"></strong></span>
        <button class="small" id="changeVisitor" type="button">변경</button>
      </div>

      <form id="birdForm">
        <input id="birdInput" name="bird" type="text" maxlength="36" autocomplete="off" list="birdSuggestions" placeholder="예: 박새, 물총새, 직박구리" aria-label="관찰한 새 이름">
        <datalist id="birdSuggestions"></datalist>
        <button class="pick-bird" id="chooseBird" type="button">선택</button>
        <button type="submit">올리기</button>
      </form>

      <div class="toolbar">
        <div class="count" id="birdCount">0마리</div>
        <button class="reload" id="reloadBirds" type="button">불러오기</button>
        <button class="clear" id="clearBirds" type="button">비우기</button>
      </div>

      <div class="bird-list" id="birdList"></div>
      <div class="status" id="syncStatus"></div>
      <div class="source">조류명/서식지: <a href="https://www.science.go.kr/mps/scienceSubject/bird/list.do" target="_blank" rel="noopener">국립중앙과학관 우리나라 텃새</a></div>
    </section>
  </main>

  <div class="bird-popup" id="birdPopup" hidden>
    <button class="bird-popup-close" id="birdPopupClose" type="button" aria-label="닫기">×</button>
    <h3 id="birdPopupName"></h3>
    <p class="bird-popup-habitat" id="birdPopupHabitat"></p>
    <p class="bird-popup-owner" id="birdPopupOwner"></p>
    <p class="bird-popup-message" id="birdPopupMessage"></p>
    <form class="message-form" id="messageForm" hidden>
      <textarea id="messageInput" maxlength="80" placeholder="말풍선 남기기" aria-label="말풍선"></textarea>
      <button type="submit">저장</button>
    </form>
  </div>

  <div class="modal" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="nameTitle" hidden>
    <div class="dialog">
      <h2 id="nameTitle">이름 입력</h2>
      <p>새를 저장한 사람을 표시하기 위해 이름만 저장합니다.</p>
      <form class="name-form" id="nameForm">
        <input id="nameInput" name="name" type="text" maxlength="20" autocomplete="name" placeholder="이름" aria-label="이름">
        <button type="submit">시작</button>
      </form>
    </div>
  </div>

  <div class="modal" id="modelUpdateModal" role="dialog" aria-modal="true" aria-labelledby="modelUpdateTitle" hidden>
    <div class="dialog">
      <h2 id="modelUpdateTitle">새 모델 업데이트</h2>
      <p id="modelUpdateSummary">전용 3D 모델이 추가됐습니다.</p>
      <ul class="update-list" id="modelUpdateList"></ul>
      <div class="dialog-actions">
        <button id="modelUpdateClose" type="button">확인</button>
      </div>
    </div>
  </div>

  <div class="modal" id="birdPickerModal" role="dialog" aria-modal="true" aria-labelledby="birdPickerTitle" hidden>
    <div class="dialog bird-picker-dialog">
      <div>
        <h2 id="birdPickerTitle">새 선택</h2>
        <p>새 얼굴을 보고 선택한 뒤 적용합니다.</p>
      </div>
      <input class="bird-picker-search" id="birdPickerSearch" type="search" autocomplete="off" placeholder="새 이름 검색" aria-label="새 이름 검색">
      <div class="bird-picker-grid" id="birdPickerGrid"></div>
      <div class="bird-picker-actions">
        <div class="bird-picker-selected" id="birdPickerSelected">선택된 새 없음</div>
        <button class="clear" id="birdPickerClose" type="button">닫기</button>
        <button id="birdPickerApply" type="button" disabled>적용</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const STORAGE_KEY = "bird-tree-sightings";
    const VISITOR_KEY = "bird-tree-visitor-name";
    const MODEL_NOTICE_KEY = "bird-tree-seen-modeled-birds";
    const MUSIC_KEY = "bird-tree-music-enabled";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGmMQrl3Yw1xcO-ViwkXutZ22aomOCZ4W-iCZEfxHBGyRcEIFGqkLAKsCsjqeulXbGSA/exec";
    const MIN_ZOOM_SCALE = 0.28;
    const MAX_ZOOM_SCALE = 2.4;
    const DEFAULT_FACE_TURN = 0.75;
    const MUSIC_VOLUME = 0.42;
    const MUSIC_FADE_SECONDS = 3;
    const BIRD_MODEL_URLS = {
      default: "./Meshy_AI_Cheerful_Cardinal_Chi_0618043308_texture.glb",
      "까마귀": "./까마귀.glb",
      "직박구리": "./직박구리.glb",
      "곤줄박이": "./곤줄박이.glb",
      "괭이갈매기": "./괭이갈매기.glb",
      "검은등할미새": "./검은등할미새.glb",
      "깝작도요": "./깝작도요.glb",
      "동고비": ["./동고비1.glb", "./동고비2.glb"],
      "때까치": "./떼까치.glb",
      "멧비둘기": "./멧비둘기.glb",
      "물닭": "./물닭.glb",
      "물총새": "./물총새.glb",
      "민물가마우지": "./민물가마우지.glb",
      "바다직박구리": "./바다직박구리.glb",
      "박새": "./박새.glb",
      "방울새": "./방울새.glb"
    };
    const BIRD_IMAGE_URLS = {
      "검은등할미새": "./검은등할미새.png",
      "곤줄박이": "./곤줄박이.png",
      "괭이갈매기": "./괭이갈매기.png",

    function createGrassTexture() {
      const textureCanvas = document.createElement("canvas");
      textureCanvas.width = 256;
      textureCanvas.height = 256;
      const context = textureCanvas.getContext("2d");
      context.fillStyle = "#a8c99c";
      context.fillRect(0, 0, 256, 256);

      for (let index = 0; index < 1300; index += 1) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        const length = 3 + Math.random() * 8;
        const hue = 92 + Math.random() * 28;
        const light = 33 + Math.random() * 28;
        context.strokeStyle = `hsla(${hue}, 38%, ${light}%, 0.34)`;
        context.lineWidth = 0.7 + Math.random() * 1.2;
        context.beginPath();
        context.moveTo(x, y);
        context.lineTo(x + Math.random() * 3 - 1.5, y - length);
        context.stroke();
      }

      const texture = new THREE.CanvasTexture(textureCanvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(9, 9);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeCylinderBetween(start, end, radius, material) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * 0.68, radius, direction.length(), 18),
        material
      );
      mesh.position.copy(midpoint);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function makeCable(start, end, sag = 0.18) {
      const curve = new THREE.CatmullRomCurve3([
        start,
        new THREE.Vector3((start.x + end.x) / 2, (start.y + end.y) / 2 - sag, (start.z + end.z) / 2),
        end
      ]);
      const cable = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 48, 0.018, 8, false),
        wireMaterial
      );
      cable.castShadow = true;
      cable.receiveShadow = true;
      root.add(cable);
    }

      cap.castShadow = true;
      holder.add(cap);
      root.add(holder);

        wireBaseHeights.forEach((y, index) => createInsulator(x, y, wireDepths[index]));

        const braceA = makeCylinderBetween(
          new THREE.Vector3(x, 2.32, -1.2),
          new THREE.Vector3(x, 5.08, -0.3),
          0.026,
          metalMaterial
        );

          new THREE.Vector3(x, 5.08, 0.3),
          0.026,
          metalMaterial
        );
        root.add(braceA, braceB);
      });

      wireBaseHeights.forEach((y, index) => {
        const z = wireDepths[index];
        makeCable(new THREE.Vector3(-4.75, y, z), new THREE.Vector3(4.75, y, z), 0.12 + index * 0.035);

      const heightJitter = 0.58 + (Math.sin(index * 8.13) + 1) * 0.34;
      const trunkHeight = 1.05 + heightJitter;
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.15, trunkHeight, 10),
        treeTrunkMaterial
      );
      trunk.position.y = trunkHeight / 2;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      tree.add(trunk);

      const leafBaseY = trunkHeight + 0.35;
      [
        [0, 0.02, 0, 0.78],
        [-0.32, -0.16, 0.08, 0.56],
        [0.3, -0.1, -0.05, 0.54],
        [0.04, 0.34, -0.02, 0.48]
      ].forEach(([lx, ly, lz, radius], leafIndex) => {
        const leaves = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 18, 12),
          treeLeafMaterials[(index + leafIndex) % treeLeafMaterials.length]
        );
        leaves.position.set(lx, leafBaseY + ly, lz);
        leaves.scale.set(1, 0.82, 1);
        leaves.castShadow = true;
        leaves.receiveShadow = true;
        tree.add(leaves);
      });

      tree.position.set(x, 0, z);
      tree.rotation.y = index * 0.61;
      tree.scale.setScalar(0.62 + (Math.sin(index * 4.71) + 1) * 0.24);
      root.add(tree);
    }

    function createTreeRing() {
      const rings = [
        { radius: 8.9, count: 24, offset: 0.08 },
        { radius: 10.1, count: 32, offset: 0.0 },
        { radius: 11.4, count: 40, offset: 0.04 }
      ];
      let treeIndex = 0;
      rings.forEach((ring) => {
        for (let index = 0; index < ring.count; index += 1) {
          const angle = ((index / ring.count) + ring.offset) * Math.PI * 2;
          const radius = ring.radius + Math.sin((treeIndex + 1) * 3.17) * 0.36;
          createTreeAt(Math.cos(angle) * radius, Math.sin(angle) * radius, treeIndex);
          treeIndex += 1;
        }
      });
    }

    function createGrassField() {
      const bladeGeometry = new THREE.ConeGeometry(0.014, 0.085, 5);
      bladeGeometry.translate(0, 0.0425, 0);
      const bladeMaterial = new THREE.MeshStandardMaterial({
        color: 0x5f9a45,
        roughness: 0.95,
        metalness: 0
      });
      const bladeCount = 2200;
      const grass = new THREE.InstancedMesh(bladeGeometry, bladeMaterial, bladeCount);
      const dummy = new THREE.Object3D();

      for (let index = 0; index < bladeCount; index += 1) {
        const angle = index * 2.399963 + Math.sin(index * 1.91) * 0.16;
        const radius = Math.sqrt((index + 0.5) / bladeCount) * 12.4;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const height = 0.48 + (Math.sin(index * 7.21) + 1) * 0.22;
        dummy.position.set(x, 0.008, z);
        dummy.rotation.set(
          Math.sin(index * 5.19) * 0.18,
          angle,
          Math.sin(index * 4.83) * 0.18
        );
        dummy.scale.set(0.8, height, 0.8);
        dummy.updateMatrix();
        grass.setMatrixAt(index, dummy.matrix);
      }
      grass.castShadow = false;
      grass.receiveShadow = true;
      root.add(grass);
    }

    function createCherryBlossomPetals() {
      const petalCount = 360;
      const petalGeometry = new THREE.PlaneGeometry(0.09, 0.048);
      const petalMaterial = new THREE.MeshBasicMaterial({
        color: 0xffbdd0,
        transparent: true,
        opacity: 0.78,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      cherryPetalMesh = new THREE.InstancedMesh(petalGeometry, petalMaterial, petalCount);
      cherryPetalMesh.frustumCulled = false;

      for (let index = 0; index < petalCount; index += 1) {
        cherryPetals.push({
          x: Math.sin(index * 12.17) * 8.8,
          y: 2.2 + ((index * 0.47) % 6.2),
          z: -5.4 + ((index * 1.73) % 10.8),
          speed: 0.14 + (Math.sin(index * 2.31) + 1) * 0.12,
          sway: 0.2 + (Math.sin(index * 5.77) + 1) * 0.26,
          phase: index * 0.67,
          scale: 0.38 + (Math.sin(index * 3.91) + 1) * 0.46 + (Math.sin(index * 9.37) + 1) * 0.12
        });
      }

      scene.add(cherryPetalMesh);
    }

    function updateCherryBlossomPetals(seconds) {
      if (!cherryPetalMesh) return;
      cherryPetals.forEach((petal, index) => {
        petal.y -= petal.speed * 0.016;
        if (petal.y < -0.2) {
          petal.y = 8.4 + Math.sin(index * 4.29) * 0.35;
          petal.x = Math.sin((seconds + index) * 2.13) * 9.2;
          petal.z = -5.4 + (((seconds * 1.7 + index * 1.73) % 10.8) + 10.8) % 10.8;
          petal.scale = 0.38 + (Math.sin((seconds + index) * 3.91) + 1) * 0.46;
        }

        const swayX = Math.sin(seconds * 0.75 + petal.phase) * petal.sway;
        const swayZ = Math.cos(seconds * 0.52 + petal.phase) * petal.sway * 0.45;
        petalDummy.position.set(petal.x + swayX, petal.y, petal.z + swayZ);
        petalDummy.rotation.set(
          seconds * 0.7 + petal.phase,
          seconds * 1.1 + petal.phase,
          Math.sin(seconds + petal.phase)
        );
        petalDummy.scale.setScalar(petal.scale);
        petalDummy.updateMatrix();
        cherryPetalMesh.setMatrixAt(index, petalDummy.matrix);
      });
      cherryPetalMesh.instanceMatrix.needsUpdate = true;
    }

    function createPerchLabel(name, visitorName) {
      const textureCanvas = document.createElement("canvas");
      const context = textureCanvas.getContext("2d");
      const width = 210;
      const height = 80;
      textureCanvas.width = width;
      textureCanvas.height = height;
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = "rgba(255, 255, 255, 0.88)";
      roundRect(context, 10, 12, width - 20, height - 24, 14);
      context.fill();
      context.strokeStyle = "rgba(25, 35, 28, 0.18)";
      context.stroke();
      context.fillStyle = "#19231c";
      fitText(context, name, width - 30, 21);
      context.fillText(name, width / 2, 33);
      if (visitorName) {
        context.fillStyle = "#2365a8";
        fitText(context, `by ${visitorName}`, width - 34, 15);
        context.fillText(`by ${visitorName}`, width / 2, 55);
      }

      const texture = new THREE.CanvasTexture(textureCanvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
      sprite.scale.set(0.82, 0.32, 1);
      sprite.position.y = 1.12;
      return sprite;
    }

    function createSpeechBubble(message) {
      const text = String(message || "").trim();
      if (!text) return null;

      const textureCanvas = document.createElement("canvas");
      const context = textureCanvas.getContext("2d");
      const width = 260;
      const height = 86;
      textureCanvas.width = width;
      textureCanvas.height = height;
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = "rgba(255, 239, 156, 0.96)";
      context.strokeStyle = "rgba(190, 136, 42, 0.28)";
      context.lineWidth = 2;
      context.beginPath();
      context.ellipse(72, 42, 48, 25, 0, 0, Math.PI * 2);
      context.ellipse(118, 32, 45, 28, 0, 0, Math.PI * 2);
      context.ellipse(166, 40, 52, 27, 0, 0, Math.PI * 2);
      context.ellipse(118, 54, 72, 22, 0, 0, Math.PI * 2);
      context.ellipse(184, 56, 44, 21, 0, 0, Math.PI * 2);
      context.fill();
      context.stroke();
      context.beginPath();
      context.moveTo(width / 2 - 12, height - 18);
      context.lineTo(width / 2 + 8, height - 18);
      context.lineTo(width / 2 - 2, height - 5);
      context.closePath();
      context.fill();
      context.stroke();
      context.fillStyle = "#19231c";
      fitText(context, text, width - 42, 18);
      context.fillText(text, width / 2, 39);

      const texture = new THREE.CanvasTexture(textureCanvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
      sprite.scale.set(1.02, 0.34, 1);
      sprite.position.y = 1.48;
      return sprite;
    }

    function createBirdModelTemplate(sourceModel) {
      const model = sourceModel.clone(true);
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const scaleGroup = new THREE.Group();
      const normalized = new THREE.Group();
      const maxDimension = Math.max(size.x, size.y, size.z) || 1;
      const modelScale = 1.05 / maxDimension;

      model.position.set(-center.x, -box.min.y, -center.z);
      model.rotation.y = Math.PI;
      model.traverse((node) => {
        if (!node.isMesh) return;
        node.castShadow = true;
        node.receiveShadow = true;
        if (node.material) node.material = node.material.clone();
      });

      scaleGroup.scale.setScalar(modelScale);
      scaleGroup.add(model);
      normalized.add(scaleGroup);
      normalized.position.y = -0.17;
      return normalized;
    }

    function pickTemplateVariant(templates, sighting, index) {
      if (!Array.isArray(templates)) return templates || null;
      if (!templates.length) return null;
      const seed = `${sighting?.savedAt || ""}|${sighting?.createdAt || ""}|${sighting?.visitorName || ""}|${sighting?.name || ""}|${index}`;
      return templates[hashString(seed) % templates.length];
    }

    function getBirdModelTemplate(name, sighting, index) {
      return pickTemplateVariant(birdModelTemplates.get(name), sighting, index)
        || pickTemplateVariant(birdModelTemplates.get("default"), sighting, index);
    }

    function loadBirdModels() {
      if (birdModelLoadStarted) return;
      birdModelLoadStarted = true;
      const loader = new GLTFLoader();
      const entries = Object.entries(BIRD_MODEL_URLS).flatMap(([name, urls]) =>
        (Array.isArray(urls) ? urls : [urls]).map((url) => [name, url])
      );
      let loadedCount = 0;
      let failedCount = 0;

      syncStatus.textContent = "새 모델을 불러오는 중...";
      entries.forEach(([name, url]) => {
        loader.load(
          url,
          (gltf) => {
            const template = createBirdModelTemplate(gltf.scene);
            const urls = BIRD_MODEL_URLS[name];
            if (Array.isArray(urls)) {
              const templates = birdModelTemplates.get(name) || [];
              templates.push(template);
              birdModelTemplates.set(name, templates);
            } else {
              birdModelTemplates.set(name, template);
            }
            loadedCount += 1;
            refreshBirds();
            syncStatus.textContent = `${loadedCount}개 새 모델을 적용했습니다.`;
          },
          undefined,
          () => {
            failedCount += 1;
            syncStatus.textContent = failedCount === entries.length
              ? "새 모델을 불러오지 못해 기본 새로 표시합니다."
              : "일부 새 모델을 불러오지 못했습니다.";
          }
        );
      });
    }

    function loadBirdModel() {
      loadBirdModels();
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + width, y, x + width, y + height, radius);
      context.arcTo(x + width, y + height, x, y + height, radius);
      context.arcTo(x, y + height, x, y, radius);
      context.arcTo(x, y, x + width, y, radius);
      context.closePath();
    }

    function fitText(context, text, maxWidth, startSize) {
      let size = startSize;
      while (size > 13) {
        context.font = `700 ${size}px system-ui, -apple-system, sans-serif`;
        if (context.measureText(text).width <= maxWidth) return;
        size -= 1;
      }
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function getFaceTurn(sighting, index) {
      const savedTurn = Number(sighting.faceTurn);
      if (Number.isFinite(savedTurn)) return Math.min(Math.max(savedTurn, 0), 1);
      return DEFAULT_FACE_TURN;
    }

    function getBirdRotationY(sighting, index, spot) {
      const turn = getFaceTurn(sighting, index);
      return turn < 0.5 ? 0 : Math.PI;
    }

    function createBird(sighting, index) {
      const fallback = palette[index % palette.length];
      const shifted = new THREE.Color(fallback);
      const profile = birdProfiles[sighting.name] || {
        body: fallback,
        head: shifted.clone().offsetHSL(-0.02, 0.03, -0.1).getHex(),
        wing: shifted.clone().offsetHSL(-0.04, 0.08, -0.18).getHex(),
        belly: shifted.clone().offsetHSL(0.05, -0.18, 0.28).getHex(),
        cheek: 0xf7efe1,
        tail: shifted.clone().offsetHSL(-0.02, 0.06, -0.25).getHex(),
        beak: 0xd49a35
      };
      const spot = wireSpots[index % wireSpots.length];
      const layer = Math.floor(index / wireSpots.length);
      const group = new THREE.Group();
      const scale = 0.78;
      const mat = (color, roughness = 0.66) => new THREE.MeshStandardMaterial({ color, roughness });

      const birdModelTemplate = getBirdModelTemplate(sighting.name, sighting, index);
      if (birdModelTemplate) {
        const model = birdModelTemplate.clone(true);
        const speechBubble = createSpeechBubble(sighting.message);
        group.add(model);
        group.add(createPerchLabel(sighting.name, sighting.visitorName));
        if (speechBubble) group.add(speechBubble);
        group.position.set(
          spot.x + ((layer % 2) * 0.42 - 0.21),
          spot.y + layer * 0.28,
          spot.z + layer * 0.16
        );
        group.rotation.y = getBirdRotationY(sighting, index, spot);
        group.scale.setScalar(scale * 1.08);
        group.userData.floatPhase = index * 0.77;
        group.userData.baseY = group.position.y;
        group.userData.isBird = true;
        group.userData.sighting = sighting;
        birdsGroup.add(group);
        return;
      }

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.34, 32, 22),
        mat(profile.body, 0.7)
      );
      body.scale.set(1.45, 0.86, 0.9);
      body.rotation.z = -0.08;
      body.castShadow = true;
      group.add(body);

      const belly = new THREE.Mesh(
        new THREE.SphereGeometry(0.24, 24, 16),
        mat(profile.belly, 0.76)
      );
      belly.position.set(0.1, -0.08, 0.25);
      belly.scale.set(1.35, 0.68, 0.34);
      belly.rotation.z = -0.04;
      group.add(belly);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.26, 36, 24),
        mat(profile.head, 0.6)
      );
      head.position.set(0.4, 0.24, 0.02);
      head.scale.set(1.08, 1.02, 1);
      head.castShadow = true;
      group.add(head);

      const facePatch = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 28, 18),
        mat(profile.cheek, 0.72)
      );
      facePatch.position.set(0.52, 0.2, 0.13);
      facePatch.scale.set(1.28, 1.0, 0.22);
      group.add(facePatch);

      const farFacePatch = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 24, 16),
        mat(profile.cheek, 0.72)
      );
      farFacePatch.position.set(0.5, 0.2, -0.12);
      farFacePatch.scale.set(1.0, 0.9, 0.18);
      group.add(farFacePatch);

      const blushMaterial = mat(0xf0a5a3, 0.78);
      const blush = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 10), blushMaterial);
      blush.position.set(0.59, 0.16, 0.205);
      blush.scale.set(1.45, 0.72, 0.18);
      group.add(blush);

      const beak = new THREE.Mesh(
        new THREE.SphereGeometry(0.075, 24, 14),
        mat(profile.beak, 0.5)
      );
      beak.position.set(0.67, 0.19, 0.02);
      beak.scale.set(1.15, 0.68, 0.78);
      group.add(beak);

      const lowerBeak = new THREE.Mesh(
        new THREE.SphereGeometry(0.058, 20, 12),
        mat(new THREE.Color(profile.beak).offsetHSL(0, -0.05, 0.16).getHex(), 0.56)
      );
      lowerBeak.position.set(0.672, 0.152, 0.02);
      lowerBeak.scale.set(1.0, 0.34, 0.68);
      group.add(lowerBeak);

      const beakLine = new THREE.Mesh(
        new THREE.BoxGeometry(0.092, 0.008, 0.108),
        mat(0x493d3d, 0.5)
      );
      beakLine.position.set(0.715, 0.178, 0.02);
      group.add(beakLine);

      const browMaterial = mat(new THREE.Color(profile.head).offsetHSL(0, 0.08, -0.18).getHex(), 0.66);
      [-0.12, 0.12].forEach((zSide) => {
        const brow = new THREE.Mesh(new THREE.SphereGeometry(0.052, 16, 10), browMaterial);
        brow.position.set(0.53, 0.305, zSide);
        brow.scale.set(1.7, 0.28, 0.18);
        brow.rotation.z = zSide > 0 ? -0.38 : 0.38;
        group.add(brow);
      });

      const eyeMaterial = mat(0x151515, 0.18);
      const sparkleMaterial = mat(0xffffff, 0.08);
      [-0.105, 0.105].forEach((zSide) => {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.048, 20, 14), eyeMaterial);
        eye.position.set(0.59, 0.245, zSide);
        eye.scale.set(0.82, 1.16, 0.82);
        group.add(eye);

        const eyeSpark = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 6), sparkleMaterial);
        eyeSpark.position.set(0.612, 0.26, zSide + (zSide > 0 ? 0.018 : -0.018));
        group.add(eyeSpark);
      });

      [-0.055, 0, 0.055].forEach((zSide, tuftIndex) => {
        const tuft = new THREE.Mesh(
          new THREE.ConeGeometry(0.018, 0.18, 10),
          mat(profile.head, 0.62)
        );
        tuft.position.set(0.32 + tuftIndex * 0.015, 0.48, zSide);
        tuft.rotation.z = -0.28 + tuftIndex * 0.14;
        tuft.rotation.x = zSide * 1.8;
        group.add(tuft);
      });

      const wing = new THREE.Mesh(
        new THREE.SphereGeometry(0.24, 28, 18),
        mat(profile.wing, 0.72)
      );
      wing.position.set(-0.05, 0.02, 0.24);
      wing.scale.set(1.35, 0.34, 0.44);
      wing.rotation.z = -0.34;
      wing.rotation.y = 0.08;
      group.add(wing);

      [-0.12, 0.0, 0.12].forEach((offset, featherIndex) => {
        const feather = new THREE.Mesh(
          new THREE.BoxGeometry(0.36, 0.032, 0.018),
          mat(new THREE.Color(profile.wing).offsetHSL(0, 0, -0.08 - featherIndex * 0.03).getHex(), 0.78)
        );
        feather.position.set(-0.07 - featherIndex * 0.04, -0.01 - featherIndex * 0.035, 0.285 + offset * 0.22);
        feather.rotation.z = -0.45;
        feather.rotation.y = 0.14;
        group.add(feather);
      });

      [-0.09, 0.0, 0.09].forEach((offset, tailIndex) => {
        const tail = new THREE.Mesh(
          new THREE.ConeGeometry(0.06, 0.46, 4),
          mat(new THREE.Color(profile.tail).offsetHSL(0, 0, tailIndex * -0.04).getHex(), 0.74)
        );
        tail.rotation.z = Math.PI / 2;
        tail.rotation.y = offset * 1.8;
        tail.position.set(-0.5, -0.02, offset);
        tail.scale.set(0.8, 1, 0.45);
        group.add(tail);
      });

      const legMaterial = mat(0x553a24, 0.82);
      [-0.12, 0.1].forEach((x) => {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.014, 0.23, 8), legMaterial);
        leg.position.set(x, -0.32, 0.04);
        leg.rotation.z = 0.05;
        group.add(leg);

        [-0.085, 0, 0.085].forEach((spread) => {
          const toe = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.007, 0.18, 8), legMaterial);
          toe.position.set(x + spread * 0.25, -0.44, 0.095 + Math.abs(spread) * 0.5);
          toe.rotation.x = Math.PI / 2 + spread * 1.4;
          toe.rotation.z = Math.PI / 2;
          group.add(toe);
        });
      });

      group.add(createPerchLabel(sighting.name, sighting.visitorName));
      const speechBubble = createSpeechBubble(sighting.message);
      if (speechBubble) group.add(speechBubble);
      group.position.set(
        spot.x + ((layer % 2) * 0.42 - 0.21),
        spot.y + 0.4 + layer * 0.28,
        spot.z + layer * 0.16
      );
      group.rotation.y = getBirdRotationY(sighting, index, spot);
      group.scale.setScalar(scale * 1.12);
      group.userData.floatPhase = index * 0.77;
      group.userData.baseY = group.position.y;
      group.userData.isBird = true;
      group.userData.sighting = sighting;
      birdsGroup.add(group);
    }

    function loadSightings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved.filter((item) => item && item.name).slice(0, 48) : [];
      } catch {
        return [];
      }
    }

    function saveSightings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sightings));
    }

    function getSightingKey(sighting) {
      return [
        sighting?.savedAt || "",
        sighting?.createdAt || "",
        sighting?.visitorName || "",
        sighting?.name || ""
      ].join("|");
    }

    function getSeenModeledBirds() {
      try {
        const saved = JSON.parse(localStorage.getItem(MODEL_NOTICE_KEY) || "null");
        return Array.isArray(saved) ? saved.filter(Boolean) : PREVIOUS_MODELED_BIRDS;
      } catch {
        return PREVIOUS_MODELED_BIRDS;
      }
    }

    function saveSeenModeledBirds(names) {
      localStorage.setItem(MODEL_NOTICE_KEY, JSON.stringify(names));
    }

    function showModelUpdateNotice() {
      const currentModeledBirds = [...MODELED_BIRDS].sort((a, b) => a.localeCompare(b, "ko"));
      const seenModeledBirds = new Set(getSeenModeledBirds());
      const updatedBirds = currentModeledBirds.filter((name) => !seenModeledBirds.has(name));

      if (!updatedBirds.length) {
        saveSeenModeledBirds(currentModeledBirds);
        return;
      }

      modelUpdateList.innerHTML = "";
      modelUpdateSummary.textContent = `전용 3D 모델 새 ${updatedBirds.length}종이 업데이트됐습니다.`;
      updatedBirds.forEach((name) => {
        const item = document.createElement("li");
        item.textContent = name;
        modelUpdateList.append(item);
      });
      modelUpdateModal.hidden = false;
    }

    function closeModelUpdateNotice() {
      const currentModeledBirds = [...MODELED_BIRDS].sort((a, b) => a.localeCompare(b, "ko"));
      saveSeenModeledBirds(currentModeledBirds);
      modelUpdateModal.hidden = true;
    }

    function normalizeSighting(item) {
      if (!item || !item.name) return null;
      return {
        visitorName: item.visitorName || "",
        name: String(item.name).trim().replace(/\s+/g, " "),
        habitat: item.habitat || birdInfo.get(item.name)?.habitat || "",
        message: String(item.message || "").trim().slice(0, 80),
        createdAt: Number(item.createdAt) || Date.now(),
        savedAt: item.savedAt || "",
        faceTurn: Number.isFinite(Number(item.faceTurn)) ? Number(item.faceTurn) : undefined
      };
    }

    function mergeSightings(nextSightings) {
      const merged = new Map();
      [...sightings, ...nextSightings].forEach((item) => {
        const sighting = normalizeSighting(item);
        if (!sighting) return;
        const key = [
          sighting.savedAt,
          sighting.createdAt,
          sighting.visitorName,
          sighting.name
        ].join("|");
        merged.set(key, sighting);
      });
      sightings = [...merged.values()].slice(-48);
    }

    let sightings = loadSightings();
    let visitorName = localStorage.getItem(VISITOR_KEY) || "";

    function setVisitorName(name) {
      visitorName = name.trim().replace(/\s+/g, " ");
      localStorage.setItem(VISITOR_KEY, visitorName);
      visitorNameLabel.textContent = visitorName || "미입력";
      nameModal.hidden = Boolean(visitorName);
      if (visitorName) input.focus();
    }

    function requestVisitorName() {
      nameInput.value = visitorName;
      nameModal.hidden = false;
      setTimeout(() => nameInput.focus(), 0);
    }

    async function sendSightingToSheet(sighting) {
      if (!APPS_SCRIPT_URL) {
        syncStatus.textContent = "Apps Script URL을 넣으면 Google Sheets에 저장됩니다.";
        return;
      }

      syncStatus.textContent = "Google Sheets에 저장 중...";
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(sighting)
        });
        syncStatus.textContent = "Google Sheets에 저장 요청을 보냈습니다.";
      } catch {
        syncStatus.textContent = "Google Sheets 저장에 실패했습니다.";
      }
    }

    async function sendFaceTurnToSheet(sighting) {
      if (!APPS_SCRIPT_URL) return;

      syncStatus.textContent = "얼굴 방향을 저장 중...";
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "updateFaceTurn",
            savedAt: sighting.savedAt,
            createdAt: sighting.createdAt,
            ownerName: sighting.visitorName,
            birdLabel: sighting.name,
            faceTurn: sighting.faceTurn
          })
        });
        syncStatus.textContent = "얼굴 방향 저장 요청을 보냈습니다.";
      } catch {
        syncStatus.textContent = "얼굴 방향 저장에 실패했습니다.";
      }
    }

    async function sendMessageToSheet(sighting) {
      if (!APPS_SCRIPT_URL) return;

      syncStatus.textContent = "말풍선을 저장 중...";
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "updateMessage",
            savedAt: sighting.savedAt,
            createdAt: sighting.createdAt,
            ownerName: sighting.visitorName,
            birdLabel: sighting.name,
            message: sighting.message
          })
        });
        syncStatus.textContent = "말풍선 저장 요청을 보냈습니다.";
      } catch {
        syncStatus.textContent = "말풍선 저장에 실패했습니다.";
      }
    }

    function loadSightingsFromSheet() {
      if (!APPS_SCRIPT_URL) return;

      const callbackName = `loadBirdTree_${Date.now()}`;
      const script = document.createElement("script");
      const separator = APPS_SCRIPT_URL.includes("?") ? "&" : "?";
      let timeoutId = 0;

      syncStatus.textContent = "Google Sheets 기록을 불러오는 중...";
      reloadButton.disabled = true;
      window[callbackName] = (rows) => {
        delete window[callbackName];
        clearTimeout(timeoutId);
        script.remove();
        reloadButton.disabled = false;

        if (!Array.isArray(rows)) {
          syncStatus.textContent = "Google Sheets 기록을 불러오지 못했습니다.";
          return;
        }

        mergeSightings(rows);
        saveSightings();
        refreshBirds();
        syncStatus.textContent = sightings.length ? "Google Sheets 기록을 불러왔습니다." : "";
      };

      script.onerror = () => {
        delete window[callbackName];
        clearTimeout(timeoutId);
        script.remove();
        reloadButton.disabled = false;
        syncStatus.textContent = "Google Sheets 기록을 불러오지 못했습니다.";
      };

      timeoutId = window.setTimeout(() => {
        delete window[callbackName];
        script.remove();
        reloadButton.disabled = false;
        syncStatus.textContent = "Google Sheets 응답이 지연되고 있습니다.";
      }, 9000);

      script.src = `${APPS_SCRIPT_URL}${separator}callback=${encodeURIComponent(callbackName)}`;
      document.body.append(script);
    }

    function renderBirdList() {
      birdCount.textContent = `${sightings.length}마리`;
      birdList.innerHTML = "";

      if (!sightings.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 전선 위에 앉은 새가 없습니다.";
        birdList.append(empty);
        return;
      }

      sightings.forEach((sighting, index) => {
        const item = document.createElement("div");
        item.className = "bird-item";
        item.classList.toggle("selected", getSightingKey(sighting) === selectedSightingKey);
        item.addEventListener("click", (event) => {
          if (event.target.closest("button")) return;
          const birdGroup = birdsGroup.children[index];
          showBirdPopup(sighting);
          if (birdGroup) focusBirdGroup(birdGroup);
        });

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.backgroundColor = `#${palette[index % palette.length].toString(16).padStart(6, "0")}`;

        const name = document.createElement("span");
        name.className = "bird-name";
        name.textContent = sighting.name;

        const front = document.createElement("button");
        front.className = "direction";
        front.type = "button";
        front.textContent = "앞";
        front.setAttribute("aria-label", `${sighting.name} 앞으로 보기`);
        front.addEventListener("click", (event) => {
          event.stopPropagation();
          sightings[index].faceTurn = 0.25;
          saveSightings();
          refreshBirds();
          sendFaceTurnToSheet(sightings[index]);
        });

        const back = document.createElement("button");
        back.className = "direction";
        back.type = "button";
        back.textContent = "뒤";
        back.setAttribute("aria-label", `${sighting.name} 뒤로 보기`);
        back.addEventListener("click", (event) => {
          event.stopPropagation();
          sightings[index].faceTurn = 0.75;
          saveSightings();
          refreshBirds();
          sendFaceTurnToSheet(sightings[index]);
        });

        const remove = document.createElement("button");
        remove.className = "remove";
        remove.type = "button";
        remove.textContent = "x";
        remove.setAttribute("aria-label", `${sighting.name} 삭제`);
        remove.addEventListener("click", (event) => {
          event.stopPropagation();
          sightings.splice(index, 1);
          saveSightings();
          refreshBirds();
        });

        item.append(swatch, name, front, back, remove);
        birdList.append(item);
      });
    }

    function refreshBirds() {
      focusedBirdGroup = null;
      birdsGroup.clear();
      sightings.forEach(createBird);
      renderBirdList();
      if (birdPopup) birdPopup.hidden = true;
      resize();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = input.value.trim().replace(/\s+/g, " ");
      if (!name) return;
      if (!visitorName) {
        requestVisitorName();
        return;
      }
      const info = birdInfo.get(name);
      const sighting = {
        visitorName,
        name,
        habitat: info?.habitat || "",
        message: "",
        createdAt: Date.now(),
        savedAt: new Date().toISOString(),
        faceTurn: DEFAULT_FACE_TURN
      };
      sightings.push(sighting);
      input.value = "";
      saveSightings();
      refreshBirds();
      sendSightingToSheet(sighting);
    });

    nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim().replace(/\s+/g, " ");
      if (!name) return;
      setVisitorName(name);
    });

    changeVisitor.addEventListener("click", requestVisitorName);

    reloadButton.addEventListener("click", loadSightingsFromSheet);

    clearButton.addEventListener("click", () => {
      if (sightings.length && !window.confirm("이 브라우저의 새 목록을 비울까요? Google Sheets 기록은 삭제되지 않습니다.")) {
        return;
      }
      sightings = [];
      saveSightings();
      refreshBirds();
      input.focus();
    });

    function clampZoomScale(value) {
      return Math.min(Math.max(value, MIN_ZOOM_SCALE), MAX_ZOOM_SCALE);
    }

    function isDesktopView() {
      return window.innerWidth >= 720;
    }

    function focusBirdGroup(birdGroup) {
      if (!isDesktopView()) return;
      focusedBirdGroup = birdGroup;
      zoomScale = Math.min(zoomScale, 0.42);
      resize();
    }

    function resetCameraView() {
      focusedBirdGroup = null;
      zoomScale = 1;
      treeRotationX = 0;
      treeRotationY = 0;
      resize();
    }

    function captureSceneImage() {
      if (!isDesktopView()) return;
      updateCameraPosition();
      renderer.render(scene, camera);
      canvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
        link.href = url;
        link.download = `bird-tree-${timestamp}.png`;
        link.click();
        URL.revokeObjectURL(url);
      }, "image/png");
    }

    function updateMusicButton() {
      musicToggle.textContent = musicEnabled ? "노래 끄기" : "노래 켜기";
    }

    function stopMusicFade() {
      if (musicFadeTimer) {
        window.clearInterval(musicFadeTimer);
        musicFadeTimer = 0;
      }
    }

    function fadeMusicTo(targetVolume, durationSeconds, onComplete) {
      stopMusicFade();
      const startVolume = backgroundMusic.volume;
      const startTime = performance.now();
      const duration = Math.max(durationSeconds, 0.1) * 1000;

      musicFadeTimer = window.setInterval(() => {
        const progress = Math.min((performance.now() - startTime) / duration, 1);
        backgroundMusic.volume = startVolume + (targetVolume - startVolume) * progress;
        if (progress >= 1) {
          stopMusicFade();
          if (onComplete) onComplete();
        }
      }, 50);
    }

    function fadeInMusic() {
      musicIsFadingOut = false;
      backgroundMusic.volume = 0;
      fadeMusicTo(MUSIC_VOLUME, MUSIC_FADE_SECONDS);
    }

    function restartMusicWithFade() {
      if (!musicEnabled) return;
      musicIsFadingOut = false;
      backgroundMusic.currentTime = 0;
      backgroundMusic.play().then(fadeInMusic).catch(updateMusicButton);
    }

    function handleMusicTimeUpdate() {
      if (!musicEnabled || musicIsFadingOut || !Number.isFinite(backgroundMusic.duration)) return;
      const fadeSeconds = Math.min(MUSIC_FADE_SECONDS, Math.max(backgroundMusic.duration / 3, 0.8));
      const remaining = backgroundMusic.duration - backgroundMusic.currentTime;
      if (remaining <= fadeSeconds) {
        musicIsFadingOut = true;
        fadeMusicTo(0, Math.max(remaining, 0.3), restartMusicWithFade);
      }
    }

    async function playBackgroundMusic() {
      if (!musicEnabled) {
        stopMusicFade();
        backgroundMusic.pause();
        updateMusicButton();
        return;
      }

      try {
        backgroundMusic.volume = 0;
        await backgroundMusic.play();
        fadeInMusic();
      } catch {
        // Browsers can block autoplay until the first user gesture.
      }
      updateMusicButton();
    }

    function toggleBackgroundMusic() {
      musicEnabled = backgroundMusic.paused;
      localStorage.setItem(MUSIC_KEY, musicEnabled ? "on" : "off");
      if (musicEnabled) {
        playBackgroundMusic();
      } else {
        stopMusicFade();
        backgroundMusic.pause();
        backgroundMusic.volume = 0;
        musicIsFadingOut = false;
        updateMusicButton();
      }
    }

    function retryMusicAfterGesture() {
      if (musicEnabled && backgroundMusic.paused) playBackgroundMusic();
    }

    function getPointerDistance() {
      const points = [...activePointers.values()];
      if (points.length < 2) return 0;
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function startDragFromPointer(event) {
      isDraggingTree = true;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartRotationY = treeRotationY;
      dragStartRotationX = treeRotationX;
    }

    function startPinch() {
      pinchStartDistance = getPointerDistance();
      pinchStartZoomScale = zoomScale;
      isDraggingTree = false;
    }

    function updatePointer(event) {
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
    }

    function releasePointer(event) {
      activePointers.delete(event.pointerId);
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      if (activePointers.size === 1) {
        const [remainingPointer] = activePointers.values();
        startDragFromPointer({ clientX: remainingPointer.x, clientY: remainingPointer.y });
        return;
      }
      isDraggingTree = false;
      pinchStartDistance = 0;
    }

    canvas.addEventListener("pointerdown", (event) => {
      updatePointer(event);
      canvas.setPointerCapture(event.pointerId);
      if (activePointers.size === 2) {
        startPinch();
        return;
      }
      if (activePointers.size === 1) {
        startDragFromPointer(event);
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!activePointers.has(event.pointerId)) return;
      updatePointer(event);
      if (activePointers.size >= 2) {
        const distance = getPointerDistance();
        if (pinchStartDistance > 0 && distance > 0) {
          zoomScale = clampZoomScale(pinchStartZoomScale * (pinchStartDistance / distance));
          resize();
        }
        return;
      }
      if (!isDraggingTree) return;
      const deltaX = event.clientX - dragStartX;
      const deltaY = event.clientY - dragStartY;
      treeRotationY = dragStartRotationY + deltaX * 0.01;
      treeRotationX = Math.min(Math.max(dragStartRotationX + deltaY * 0.006, -0.72), 0.72);
    });

    canvas.addEventListener("pointerup", releasePointer);
    canvas.addEventListener("pointercancel", releasePointer);

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      zoomScale = clampZoomScale(zoomScale * (event.deltaY > 0 ? 1.12 : 0.86));
      resize();
    }, { passive: false });

    function updateCameraPosition() {
      const isMobile = window.innerWidth < 720;
      scenePivot.position.x = isMobile ? 0 : 1.45;

      if (focusedBirdGroup && focusedBirdGroup.parent && isDesktopView()) {
        focusedBirdGroup.getWorldPosition(cameraTarget);
        cameraTarget.y += 0.46;
        camera.position.set(
          cameraTarget.x + 0.35,
          cameraTarget.y + 1.2 * Math.sqrt(zoomScale),
          cameraTarget.z + 5.2 * zoomScale
        );
        camera.lookAt(cameraTarget);
        return;
      }

      camera.position.set(
        isMobile ? 0 : 0.45,
        (isMobile ? 4.0 : 3.52) * Math.sqrt(zoomScale),
        (isMobile ? 15.2 : 11.2) * zoomScale
      );
      camera.lookAt(scenePivot.position.x, isMobile ? 3.85 : 3.6, 0);
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      updateCameraPosition();
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      const seconds = time * 0.001;
      const idleSway = isDraggingTree ? 0 : Math.sin(seconds * 0.18) * 0.04;
      scenePivot.rotation.x = treeRotationX;
      scenePivot.rotation.y = treeRotationY + idleSway;
      birdsGroup.children.forEach((bird) => {
        bird.position.y = bird.userData.baseY + Math.sin(seconds * 1.6 + bird.userData.floatPhase) * 0.025;
      });
      updateCherryBlossomPetals(seconds);
      updateCameraPosition();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    const suggestedBirds = [...knownBirds].sort((a, b) => {
      const modeledDiff = Number(MODELED_BIRDS.has(b.name)) - Number(MODELED_BIRDS.has(a.name));
      return modeledDiff || a.name.localeCompare(b.name, "ko");
    });

    suggestedBirds.forEach((bird) => {
      const option = document.createElement("option");
      option.value = bird.name;
      const hasModel = MODELED_BIRDS.has(bird.name);
      const newLabel = NEW_MODELED_BIRDS.has(bird.name) ? "new · " : "";
      option.label = hasModel ? `${newLabel}🪶 전용 3D 모델 · ${bird.habitat}` : bird.habitat;
      birdSuggestions.append(option);
    });

    function selectPickerBird(name) {
      selectedPickerBirdName = name;
      birdPickerSelected.textContent = name ? `${name} 선택됨` : "선택된 새 없음";
      birdPickerApply.disabled = !name;
      birdPickerGrid.querySelectorAll(".bird-choice").forEach((button) => {
        button.classList.toggle("selected", button.dataset.name === name);
      });
    }

    function createBirdChoice(bird) {
      const button = document.createElement("button");
      button.className = "bird-choice";
      button.type = "button";
      button.dataset.name = bird.name;

      const thumb = document.createElement("span");
      thumb.className = "bird-choice-thumb";
      const imageUrl = BIRD_IMAGE_URLS[bird.name];
      if (imageUrl) {
        const image = document.createElement("img");
        image.src = imageUrl;
        image.alt = "";
        image.loading = "lazy";
        image.onerror = () => {
          image.remove();
          thumb.textContent = bird.name.slice(0, 1);
        };
        thumb.append(image);
      } else {
        thumb.textContent = bird.name.slice(0, 1);
      }

      const text = document.createElement("span");
      const name = document.createElement("span");
      name.className = "bird-choice-name";
      name.textContent = bird.name;
      const meta = document.createElement("span");
      meta.className = "bird-choice-meta";
      meta.textContent = MODELED_BIRDS.has(bird.name)
        ? `${NEW_MODELED_BIRDS.has(bird.name) ? "new · " : ""}전용 3D`
        : "";
      text.append(name, meta);

      button.append(thumb, text);
      button.addEventListener("click", () => selectPickerBird(bird.name));
      return button;
    }

    function renderBirdPicker(filter = "") {
      const keyword = filter.trim().replace(/\s+/g, " ");
      birdPickerGrid.innerHTML = "";
      suggestedBirds
        .filter((bird) => !keyword || bird.name.includes(keyword) || bird.habitat.includes(keyword))
        .forEach((bird) => birdPickerGrid.append(createBirdChoice(bird)));
      selectPickerBird(selectedPickerBirdName);
    }

    function openBirdPicker() {
      selectedPickerBirdName = input.value.trim();
      birdPickerSearch.value = "";
      renderBirdPicker();
      birdPickerModal.hidden = false;
      setTimeout(() => birdPickerSearch.focus(), 0);
    }

    function closeBirdPicker() {
      birdPickerModal.hidden = true;
    }

    function applyBirdPickerSelection() {
      if (!selectedPickerBirdName) return;
      input.value = selectedPickerBirdName;
      closeBirdPicker();
      input.focus();
    }

    const raycaster = new THREE.Raycaster();
    const pointerNdc = new THREE.Vector2();
    let pointerDownPos = null;

    function findBirdGroup(object) {
      let node = object;
      while (node) {
        if (node.userData && node.userData.isBird) return node;
        node = node.parent;
      }
      return null;
    }

    function showBirdPopup(sighting) {
      activePopupSighting = sighting;
      selectedSightingKey = getSightingKey(sighting);
      renderBirdList();
      const info = birdInfo.get(sighting.name);
      const isOwner = visitorName && sighting.visitorName === visitorName;
      birdPopupName.textContent = sighting.name;
      birdPopupHabitat.textContent = info ? `서식지 · ${info.habitat}` : "";
      birdPopupOwner.textContent = sighting.visitorName ? `기록자 · ${sighting.visitorName}` : "";
      birdPopupMessage.textContent = sighting.message || "";
      messageInput.value = sighting.message || "";
      messageForm.hidden = !isOwner;
      birdPopup.hidden = false;
    }

    function hideBirdPopup() {
      birdPopup.hidden = true;
      activePopupSighting = null;
    }

    function saveActiveMessage(event) {
      event.preventDefault();
      if (!activePopupSighting) return;
      const key = getSightingKey(activePopupSighting);
      const target = sightings.find((sighting) => getSightingKey(sighting) === key);
      if (!target || target.visitorName !== visitorName) return;
      target.message = messageInput.value.trim().replace(/\s+/g, " ").slice(0, 80);
      activePopupSighting = target;
      selectedSightingKey = key;
      saveSightings();
      refreshBirds();
      sendMessageToSheet(target);
    }

    canvas.addEventListener("pointerdown", (event) => {
      pointerDownPos = { x: event.clientX, y: event.clientY };
    });

    canvas.addEventListener("pointerup", (event) => {
      if (!pointerDownPos) return;
      const moved = Math.hypot(event.clientX - pointerDownPos.x, event.clientY - pointerDownPos.y);
      pointerDownPos = null;
      if (moved > 8) return;

      const rect = canvas.getBoundingClientRect();
      pointerNdc.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointerNdc.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointerNdc, camera);

      const hits = raycaster.intersectObjects(birdsGroup.children, true);
      for (const hit of hits) {
        const birdGroup = findBirdGroup(hit.object);
        if (birdGroup) {
          showBirdPopup(birdGroup.userData.sighting);
          focusBirdGroup(birdGroup);
          return;
        }
      }
      hideBirdPopup();
    });

    birdPopupClose.addEventListener("click", hideBirdPopup);
    modelUpdateClose.addEventListener("click", closeModelUpdateNotice);
    messageForm.addEventListener("submit", saveActiveMessage);
    resetView.addEventListener("click", resetCameraView);
    captureScene.addEventListener("click", captureSceneImage);
    musicToggle.addEventListener("click", toggleBackgroundMusic);
    backgroundMusic.addEventListener("timeupdate", handleMusicTimeUpdate);
    backgroundMusic.addEventListener("ended", restartMusicWithFade);
    document.addEventListener("pointerdown", retryMusicAfterGesture, { once: true });
    chooseBird.addEventListener("click", openBirdPicker);
    birdPickerClose.addEventListener("click", closeBirdPicker);
    birdPickerApply.addEventListener("click", applyBirdPickerSelection);
    birdPickerSearch.addEventListener("input", () => renderBirdPicker(birdPickerSearch.value));
    birdPickerModal.addEventListener("click", (event) => {
      if (event.target === birdPickerModal) closeBirdPicker();
    });

    // Mobile bottom sheet swipe
    const isMobileSwipe = window.innerWidth < 720;
    const sheetHandle = document.querySelector("#sheetHandle");
    if (isMobileSwipe && panel && sheetHandle) {
      let isCollapsed = false;

      function setCollapsed(collapsed, animate = true) {
        isCollapsed = collapsed;
        if (!animate) panel.style.transition = "none";
        panel.classList.toggle("collapsed", collapsed);
        if (!animate) requestAnimationFrame(() => { panel.style.transition = ""; });
      }

      sheetHandle.addEventListener("touchstart", (event) => {
        if (event.touches.length === 1) {
          panelSwipeStartY = event.touches[0].clientY;
          isPanelSwiping = true;
          panel.style.transition = "none";
        }
      }, { passive: true });

      sheetHandle.addEventListener("touchmove", (event) => {
        if (!isPanelSwiping) return;
        const deltaY = event.touches[0].clientY - panelSwipeStartY;
        const base = isCollapsed ? panel.offsetHeight - 40 : 0;
        const clampedDelta = Math.max(-base, deltaY);
        if (clampedDelta !== 0) {
          panel.style.transform = `translateY(${base + clampedDelta}px)`;
        }
      }, { passive: true });

      sheetHandle.addEventListener("touchend", (event) => {
        if (!isPanelSwiping) return;
        isPanelSwiping = false;
        panel.style.transition = "";
        panel.style.transform = "";
        const deltaY = event.changedTouches[0].clientY - panelSwipeStartY;
        if (!isCollapsed && deltaY > 50) {
          setCollapsed(true);
        } else if (isCollapsed && deltaY < -30) {
          setCollapsed(false);
        } else {
          setCollapsed(isCollapsed);
        }
      }, { passive: true });

      sheetHandle.addEventListener("touchcancel", () => {
        isPanelSwiping = false;
        panel.style.transition = "";
        panel.style.transform = "";
        setCollapsed(isCollapsed);
      }, { passive: true });
    }

    createUtilityLine();
    createTreeRing();
    createGrassField();
    createCherryBlossomPetals();
    setVisitorName(visitorName);
    if (!visitorName) requestVisitorName();
    showModelUpdateNotice();
    refreshBirds();
    loadBirdModel();
    loadSightingsFromSheet();
    resize();
    playBackgroundMusic();
    window.addEventListener("resize", resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
